<!DOCTYPE html>
<html>

<head>

    <title>Admin</title>
    <link rel="stylesheet"  href="estilos/estilosPagina.css">
    <link rel="stylesheet"  href="estilos/estilosAdmin.css">
    <script src = "./global.js"></script>

</head>

<body>

    
    <div class="user-container">
        <button id="logout" class="logout">
            <img src="estilos/Imagenes/iconoLogout.png" alt="Salir">Cerrar Sesión
        </button>
    </div>

    <div class="user-container1" id="menu-navegacion" ></div>

    <h2 style="margin-bottom: 5px;">Bienvenido adminRoot </h2>
    <p style="font-style: italic;  margin-top: 0; color: aliceblue;">
            "Detén el tiempo, disfruta el momento. Deja que el aroma te inspire y el sabor te despierte. ☕"
    </p>
    
    <a href="Carrito.html" class="Stock">Visualizar Stock🍔</a>
    <script src="productos.js"></script>
    <script src="reseñas.js"></script>
    <script src="admin_logic.js"></script>

    <div class="AdminGestion">
        <h2>Gestión de Precios y Stock</h2>
        <table class="TablaAdmin" id="tabla-gestion">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio Actual</th>
                    <th>Nuevo Precio</th>
                    <th>Actualizar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-admin"></tbody>
        </table>
    </div>

    <div class="AdminGestion">
        <h2>Gestión de Reseñas</h2>
        <table class="TablaAdmin">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Reseña</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="Reseña-tabla"></tbody>
        </table>
    </div>

    <div class="AdminGestion" style="margin-top: 50px;">
        <h2>Añadir Nuevo Producto</h2>
        <div class="form-anadir">
            <input type="text" id="nuevo-id" placeholder="ID (ej: PizzaNapo)">
            <input type="text" id="nuevo-nombre" placeholder="Nombre del Producto">
            <input type="number" id="nuevo-precio" step="0.5" placeholder="Precio ($)">
            <input type="text" id="nuevo-imagen" placeholder="Ruta: estilos/Imagenes/Comidas/archivo.jpeg">
            <button class="actualizar" id="anadir-producto">Guardar en Catálogo</button>
        </div>
    </div>


    
</body>

</html>
